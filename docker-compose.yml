# ─────────────────────────────────────────────────────────────────────────────
#  RTL-SDR Scanner — Docker Compose Stack
#
#  Deploy this file as a Stack in Portainer.
#  REQUIRED: Change SECRET_KEY before first run.
#  REQUIRED: Your RTL-SDR dongle must be plugged in before the container starts.
# ─────────────────────────────────────────────────────────────────────────────

services:
  rtl-sdr-scanner:
    image: rtl-sdr-scanner:latest
    container_name: rtl-sdr-scanner

    # ── Network ───────────────────────────────────────────────────────────────
    ports:
      - "${HOST_PORT:-8073}:8073"

    # ── Environment ───────────────────────────────────────────────────────────
    environment:
      - PORT=8073
      - CONFIG_FILE=/data/config.json
      # CHANGE THIS — use `openssl rand -hex 32` to generate a secure value
      - SECRET_KEY=${SECRET_KEY:-change_this_to_a_random_secret_key_before_running}
      # Optional: restrict Socket.IO CORS. Empty/unset = same-origin only.
      # Set to "*" for unrestricted (not recommended) or a comma-separated
      # list of origins, e.g. "https://radio.example.com,https://intra.lan".
      # - ALLOWED_ORIGINS=

    # ── Persistent Storage ────────────────────────────────────────────────────
    volumes:
      - rtl_sdr_data:/data               # stores config.json (frequencies, settings)

    # ── USB / RTL-SDR Hardware Access ─────────────────────────────────────────
    #
    # Option A (recommended): pass through the entire USB bus.
    # Works for most setups and is the simplest approach.
    devices:
      - /dev/bus/usb:/dev/bus/usb

    # Option B: if Option A doesn't work, uncomment privileged mode instead.
    # privileged: true

    # ── Health + Restart ──────────────────────────────────────────────────────
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL",
             "python -c \"import os,urllib.request; urllib.request.urlopen('http://127.0.0.1:'+os.environ.get('PORT','8073')+'/api/status', timeout=5)\""]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

# ── Named Volumes ─────────────────────────────────────────────────────────────
volumes:
  rtl_sdr_data:
    driver: local
